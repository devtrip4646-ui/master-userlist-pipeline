name: Pull deposits/withdrawals/wallet from business API

on:
  # GitHub's own `schedule:` trigger stopped firing for this repo (confirmed dead,
  # survived disable/re-enable and a fresh commit -- see Cloudflare Worker's
  # scheduled() handler in worker/src/index.js, which now dispatches this hourly
  # via the API instead).
  workflow_dispatch: {}

concurrency:
  group: db-ingest
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Pull and ingest
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python3 api_pull_ingest.py

      - name: Refresh deposit report
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # Optional -- additive D1 user-search mirror (see
          # sync_user_search_to_d1 in build_deposit_report.py). If either
          # secret is unset, that step just logs and skips; the R2
          # user_search shards above it are unaffected either way.
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_USER_SEARCH_DATABASE_ID: "3794f67f-ae52-4f68-b07c-9844e9425036"
        run: |
          python3 build_deposit_report.py
