name: Fix user totals (one-off correction)

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: "User ID to correct"
        required: true
      balance:
        description: "Correct user_balance (optional)"
        required: false
        default: ""
      total_recharge:
        description: "Correct total_recharge, lifetime deposit amount (optional)"
        required: false
        default: ""
      total_withdrawal:
        description: "Correct total_withdrawal, lifetime withdrawal amount (optional)"
        required: false
        default: ""
      recharge_count:
        description: "Correct recharge_count, lifetime deposit count (optional)"
        required: false
        default: ""

concurrency:
  group: db-ingest
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Fix user totals
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          ARGS="--user-id ${{ inputs.user_id }}"
          if [ -n "${{ inputs.balance }}" ]; then ARGS="$ARGS --balance ${{ inputs.balance }}"; fi
          if [ -n "${{ inputs.total_recharge }}" ]; then ARGS="$ARGS --total-recharge ${{ inputs.total_recharge }}"; fi
          if [ -n "${{ inputs.total_withdrawal }}" ]; then ARGS="$ARGS --total-withdrawal ${{ inputs.total_withdrawal }}"; fi
          if [ -n "${{ inputs.recharge_count }}" ]; then ARGS="$ARGS --recharge-count ${{ inputs.recharge_count }}"; fi
          python3 fix_user_totals.py $ARGS

      - name: Refresh deposit report
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python3 build_deposit_report.py
