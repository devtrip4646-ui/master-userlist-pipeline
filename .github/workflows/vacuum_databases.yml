name: Vacuum databases (maintenance)

on:
  workflow_dispatch: {}
  schedule:
    # Weekly, Sunday 02:00 UTC -- a quiet hour, low collision odds with the
    # hourly pipeline even without the concurrency guard below. (Note:
    # GitHub's own schedule trigger has been unreliable for this repo before;
    # this can also always be run manually via workflow_dispatch.)
    - cron: "0 2 * * 0"

# Same group as api_pull.yml/reassign_agent.yml/ban_user.yml/etc. -- VACUUM
# downloads, rewrites, and re-uploads both DBs, so it must never run
# concurrently with anything else that touches them. Queues behind the
# pipeline instead of racing it.
concurrency:
  group: db-ingest
  cancel-in-progress: false

jobs:
  vacuum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Vacuum databases
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python3 vacuum_databases.py
