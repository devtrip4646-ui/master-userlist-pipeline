name: Manual wallet deduct (one-off, recorded as a ledger transaction)

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: "User ID to deduct from"
        required: true
      amount:
        description: "Positive amount to deduct"
        required: true
      reason:
        description: "Reason (stored in source_id column)"
        required: false
        default: "Manual deduct"

concurrency:
  group: db-ingest
  cancel-in-progress: false

jobs:
  deduct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Record manual deduction
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python3 manual_wallet_deduct.py --user-id "${{ inputs.user_id }}" --amount "${{ inputs.amount }}" \
            --reason "${{ inputs.reason }}"

      - name: Refresh deposit report
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python3 build_deposit_report.py
