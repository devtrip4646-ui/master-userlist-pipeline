name: Check wallet row (read-only diagnostic)

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: "User ID to inspect"
        required: true
      time:
        description: "Exact create_time to look for, e.g. 2026-07-04 01:32:52"
        required: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Check wallet row
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python3 check_wallet_row.py --user-id "${{ inputs.user_id }}" --time "${{ inputs.time }}"
